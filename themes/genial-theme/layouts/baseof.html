<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | Genial Inc.</title>

    {{ $cssMain := resources.Get "css/style.css" | minify }}
    <link rel="stylesheet" type="text/css" href="{{ $cssMain.RelPermalink }}">
</head>
<body>
    {{ partial "header.html" . }}
    
    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    {{ $jsMain := resources.Get "js/main.js" | minify }}
    <script src="{{ $jsMain.RelPermalink }}" defer></script>
</body>
</html>
