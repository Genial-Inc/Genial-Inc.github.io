
{{ define "main" }}

<div class="list-header" style="margin-bottom: 3rem;">
    <h1>{{ .Title }}</h1>
    {{ if .Content }}
        <div class="about-p">{{ .Content }}</div>
    {{ end }}
</div>

<section class="projects">
    <!-- Using a flex column so the project cards stack neatly into a catalog -->
    <div class="catalog-stack" style="display: flex; flex-direction: column; gap: 2rem;">
        
        {{ range .Pages }}
        <div class="project-box">
            <div class="p-info">
                <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
                <p style="font-size: 0.85rem; opacity: 0.7; margin-bottom: 0.5rem;">
                    Ajouté le {{ .Date.Format "02/01/2006" }}
                </p>
                <p>{{ .Description }}</p>
                <a href="{{ .RelPermalink }}" class="btn btn-small">Voir les détails</a>
            </div>
            <div class="p-img">🎮</div>
        </div>
        {{ end }}

    </div>
</section>

{{ end }}
